apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wayom
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`wayom.local.${DOMAIN}`)
      kind: Rule
      middlewares:
        - name: authelia-forward-auth
          namespace: network-system
      services:
        - name: wayom-service
          port: 3080
  tls:
    certResolver: letsencrypt
