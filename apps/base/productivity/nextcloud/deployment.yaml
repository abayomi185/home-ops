apiVersion: apps/v1
kind: Deployment
metadata:
  name: &deploymentName nextcloud-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *deploymentName
  template:
    metadata:
      labels:
        app: *deploymentName
    spec:
      containers:
        - image: nextcloud:latest@sha256:1a9bb628eea0ab9802233b67508bf1732e1ac5716af0366c8581bcbc7764080d
          imagePullPolicy: IfNotPresent
          name: nextcloud
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /var/www/html
              name: config-data
              subPath: nextcloud/config
            - mountPath: /var/www/html/data/nfs-share
              name: nfs-data-volume
      hostname: nextcloud
      # Volumes need to be defined in the patch file of flux deployment
      # volumes:
      #   - name: nfs-data-volume
      #     nfs:
      #       server: ${NFS_STORAGE_HOST_FAST}
      #       path: /mnt/mopower/swarm-data
      #   - name: config-data
      #     nfs:
      #       server: ${NFS_STORAGE_HOST_FAST}
      #       path: ${NFS_STORAGE_CONFIG_DATA_PATH}
