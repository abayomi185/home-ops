apiVersion: apps/v1
kind: Deployment
metadata:
  name: &deploymentName nextcloud-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *deploymentName
  template:
    metadata:
      labels:
        app: *deploymentName
    spec:
      containers:
        - image: nextcloud:latest@sha256:5baecc7baf8991ca0d4b202c349c75c1c83129568284fd1ec6bb7e4417e0a5bb
          imagePullPolicy: IfNotPresent
          name: nextcloud
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /var/www/html
              name: config-data
              subPath: nextcloud/config
            - mountPath: /var/www/html/data/nfs-share
              name: nfs-data-volume
      hostname: nextcloud
      # Volumes need to be defined in the patch file of flux deployment
      # volumes:
      #   - name: nfs-data-volume
      #     nfs:
      #       server: ${NFS_STORAGE_HOST_FAST}
      #       path: /mnt/mopower/swarm-data
      #   - name: config-data
      #     nfs:
      #       server: ${NFS_STORAGE_HOST_FAST}
      #       path: ${NFS_STORAGE_CONFIG_DATA_PATH}
