apiVersion: apps/v1
kind: Deployment
metadata:
  name: &deploymentName hermes-agent-deployment
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: *deploymentName
  template:
    metadata:
      labels:
        app: *deploymentName
    spec:
      containers:
        - image: nousresearch/hermes-agent:v2026.7.7@sha256:ce3b39adf33fffae8cb19dcae74f971975b972efe91207f7d7539f80a0aae66a
          imagePullPolicy: IfNotPresent
          name: hermes-agent
          args:
            - gateway
            - run
          env:
            - name: PUID
              value: "1001"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "007"
            - name: TZ
              value: Europe/London
            - name: HERMES_DASHBOARD
              value: "true"
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_GATEWAY_BOOTSTRAP_STATE
              value: running
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: 0.0.0.0
            - name: GITHUB_APP_PRIVATE_KEY_FILE
              value: /opt/data/github-app/private-key.pem
          envFrom:
            - secretRef:
                name: hermes-agent-secrets
          ports:
            - containerPort: 9119
              name: http
              protocol: TCP
            - containerPort: 8642
              name: api
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 8
          volumeMounts:
            - mountPath: /opt/data
              name: config-data
              subPath: hermes-agent/config
            - mountPath: /opt/data/github-app
              name: github-app-auth
              readOnly: true
      hostname: hermes-agent
      volumes:
        - name: github-app-auth
          projected:
            defaultMode: 0555
            sources:
              - configMap:
                  name: hermes-agent-github-app-auth
                  items:
                    - key: github-app-token
                      path: github-app-token
              - secret:
                  name: hermes-agent-secrets
                  items:
                    - key: GITHUB_APP_PRIVATE_KEY
                      path: private-key.pem
        - name: config-data
          nfs:
            server: ${NFS_STORAGE_HOST_FAST}
            path: ${NFS_STORAGE_CONFIG_DATA_PATH}
