---
# Authelia configuration (v4.39 format)
# Updated from v4.37.5 config:
# - session.domain -> session.cookies[].domain (multi-domain protection)
# - default_redirection_url -> session.cookies[].default_redirection_url
# - session.remember_me_duration -> session.remember_me
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
data:
  configuration.yml: |
    ---
    server:
      address: 'tcp://0.0.0.0:9091'
    log:
      level: info
    totp:
      issuer: Yomitosh Auth
    webauthn:
      enable_passkey_login: true
      experimental_enable_passkey_uv_two_factors: true
      display_name: Yomitosh Auth
      attestation_conveyance_preference: indirect
      selection_criteria:
        discoverability: preferred
        user_verification: required
    authentication_backend:
      file:
        path: /etc/authelia/users_database.yml
        password:
          algorithm: argon2id
          iterations: 1
          salt_length: 16
          parallelism: 8
          memory: 64
    access_control:
      default_policy: deny
      rules:
        - domain: "*"
          networks:
            - 100.64.0.0/10
            - 10.0.1.0/24
          policy: bypass
        - domain: immich.yomitosh.media
          subject:
            - group:admins
          policy: two_factor
    session:
      name: authelia_session
      expiration: 5400
      inactivity: 1800
      remember_me: 864000
      cookies:
        - domain: yomitosh.media
          authelia_url: 'https://auth.yomitosh.media'
    regulation:
      max_retries: 3
      find_time: 120
      ban_time: 300
    storage:
      local:
        path: /config/db.sqlite3
    notifier:
      smtp:
        address: 'submission://smtp.gmail.com:587'
        username: 'captyomjnr@gmail.com'
        sender: 'Yomitosh Auth <captyomjnr@gmail.com>'
        startup_check_address: 'captyomjnr@gmail.com'
        subject: '[Authelia] {title}'
    identity_providers:
      oidc:
        hmac_secret: '{{ secret "/secrets/oidc_hmac_secret" }}'
        jwks:
          - key_id: default
            algorithm: RS256
            use: sig
            key: {{ secret "/secrets/oidc_issuer_private_key" | mindent 10 "|" | msquote }}
        clients:
          - client_id: immich
            client_name: Immich
            client_secret: '{{ secret "/secrets/immich_oidc_client_secret_digest" }}'
            public: false
            authorization_policy: two_factor
            require_pkce: false
            pkce_challenge_method: ''
            redirect_uris:
              - https://immich.yomitosh.media/auth/login
              - https://immich.yomitosh.media/user-settings
              - https://immich.local.yomitosh.media/auth/login
              - https://immich.local.yomitosh.media/user-settings
              - app.immich:///oauth-callback
            scopes:
              - openid
              - profile
              - email
            response_types:
              - code
            grant_types:
              - authorization_code
            access_token_signed_response_alg: none
            userinfo_signed_response_alg: none
            token_endpoint_auth_method: client_secret_post
  users_database.yml: |
    ---
    users:
      yomi:
        password: "$argon2id$v=19$m=65536,t=1,p=8$ekdFaTRxOVJPNE4vTitSTA$R9g7xQZYVGFYHjR2rDhsDlBKAHTuUfDAv950ZEWT1+c"
        displayname: Yomi
        email: captyomjnr@gmail.com
        groups:
          - admins
          - dev
