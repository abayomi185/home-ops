---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authelia-config
data:
  configuration.yml: |
    ---
    server:
      address: 'tcp://0.0.0.0:9091'
    log:
      level: info
    totp:
      issuer: yomitosh.media
    duo_api:
      hostname: api-c60136e7.duosecurity.com
      integration_key: DILCZ6YH0N7RNG8WL37V
      enable_self_enrollment: true
    authentication_backend:
      file:
        path: /etc/authelia/users_database.yml
        password:
          algorithm: argon2id
          iterations: 1
          salt_length: 16
          parallelism: 8
          memory: 64
    access_control:
      default_policy: deny
      rules:
        # Trusted networks bypass auth. IoT intentionally excluded.
        - domain: '*.local.yomitosh.media'
          networks:
            - 10.1.5.0/24    # infra / VLAN 5
            - 10.1.10.0/24   # main LAN / VLAN 10
            - 100.64.0.0/10  # Tailscale / CGNAT
          policy: bypass

        # API clients authenticate with app-native API keys, not browser redirects.
        - domain: sonarr.local.yomitosh.media
          resources:
            - '^/api(/.*)?$'
          policy: bypass
        - domain: radarr.local.yomitosh.media
          resources:
            - '^/api(/.*)?$'
          policy: bypass

        # Sensitive apps require MFA when accessed outside trusted networks.
        - domain:
            - bambubuddy.local.yomitosh.media
            - chat-internal.local.yomitosh.media
            - immich.local.yomitosh.media
            - nextcloud.local.yomitosh.media
            - uptime-kuma.local.yomitosh.media
          policy: two_factor

        # General apps require password auth when accessed outside trusted networks.
        - domain:
            - bazarr.local.yomitosh.media
            - jackett.local.yomitosh.media
            - jellyfin.local.yomitosh.media
            - lidarr.local.yomitosh.media
            - ombi.local.yomitosh.media
            - prowlarr.local.yomitosh.media
            - radarr.local.yomitosh.media
            - requestrr.local.yomitosh.media
            - send2ereader.local.yomitosh.media
            - sonarr.local.yomitosh.media
            - transmission.local.yomitosh.media
            - wayom.local.yomitosh.media
          policy: one_factor
    session:
      name: authelia_session
      same_site: lax
      expiration: 1h30m
      inactivity: 30m
      remember_me: 10d
      cookies:
        - domain: yomitosh.media
          authelia_url: 'https://auth.local.yomitosh.media'
          default_redirection_url: 'https://chat-internal.local.yomitosh.media'
    regulation:
      max_retries: 3
      find_time: 120
      ban_time: 300
    storage:
      local:
        path: /config/db.sqlite3
    notifier:
      filesystem:
        filename: /config/notification.txt
  users_database.yml: |
    ---
    users:
      yomi:
        password: "$argon2id$v=19$m=65536,t=1,p=8$ekdFaTRxOVJPNE4vTitSTA$R9g7xQZYVGFYHjR2rDhsDlBKAHTuUfDAv950ZEWT1+c"
        displayname: Yomi
        email: captyomjnr@gmail.com
        groups:
          - admins
          - dev
