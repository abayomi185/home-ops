apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bambubuddy
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`bambubuddy.local.${DOMAIN}`)
      kind: Rule
      middlewares:
        - name: authelia-forward-auth
          namespace: network-system
      services:
        - name: bambubuddy-service
          port: 8000
  tls:
    certResolver: letsencrypt
