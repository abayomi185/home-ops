apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: transmission
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`transmission.internal.${DOMAIN}`)
      kind: Rule
      services:
        - name: transmission-service
          port: 9091
  tls:
    certResolver: letsencrypt
