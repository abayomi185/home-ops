apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ombi
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ombi.local.${DOMAIN}`)
      kind: Rule
      middlewares:
        - name: authelia-forward-auth
          namespace: network-system
      services:
        - name: ombi-service
          port: 3579
  tls:
    certResolver: letsencrypt
