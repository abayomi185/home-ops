apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: sonarr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`sonarr.internal.${SECRET_DOMAIN}`) || Host(`sonarr.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: sonarr-service
          port: 8989
  tls:
    certResolver: letsencrypt
