apiVersion: apps/v1
kind: Deployment
metadata:
  name: &deploymentName jackett-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *deploymentName
  template:
    metadata:
      labels:
        app: *deploymentName
    spec:
      containers:
        - env:
            - name: TZ
              value: Europe/London
            - name: PUID
              value: "1001"
            - name: PGID
              value: "100"
          image: lscr.io/linuxserver/jackett:latest@sha256:7fb1270ed7a7705de9fb339b5e3d6f1ed62cb433a53490aff10ee5a3d7116b65
          imagePullPolicy: IfNotPresent
          name: jackett
          ports:
            - containerPort: 9117
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: config-volume
              subPath: jackett/config
            - mountPath: /downloads
              name: downloads-volume
              subPath: jellyfin/downloads
      hostname: jackett
      volumes:
        - name: config-volume
          nfs:
            server: ${NFS_STORAGE_HOST_FAST}
            path: ${NFS_STORAGE_CONFIG_DATA_PATH}
        - name: downloads-volume
          nfs:
            server: ${NFS_STORAGE_HOST_FAST}
            path: /mnt/mopower/swarm-data
