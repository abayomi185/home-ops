apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jackett
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`jackett.internal.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: jackett-service
          port: 9117
  tls:
    certResolver: letsencrypt
