apiVersion: apps/v1
kind: Deployment
metadata:
  name: &deploymentName overseerr-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *deploymentName
  template:
    metadata:
      labels:
        app: *deploymentName
    spec:
      securityContext:
        fsGroup: 100
      containers:
        - env:
            - name: TZ
              value: Europe/London
          image: sctx/overseerr:latest@sha256:6197516c9d7b58ccf113455e32aafb94df5d91995fe50e8c2cae6ba6c7c7b7de
          imagePullPolicy: IfNotPresent
          name: overseerr
          securityContext:
            runAsUser: 1001
            runAsGroup: 100
          ports:
            - containerPort: 5055
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /app/config
              name: config-volume
              subPath: overseerr/config
      hostname: overseerr
      volumes:
        - name: config-volume
          nfs:
            server: ${NFS_STORAGE_HOST_FAST}
            path: ${NFS_STORAGE_CONFIG_DATA_PATH}
