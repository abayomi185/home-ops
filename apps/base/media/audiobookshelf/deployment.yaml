apiVersion: apps/v1
kind: Deployment
metadata:
  name: &deploymentName audiobookshelf-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *deploymentName
  template:
    metadata:
      labels:
        app: *deploymentName
    spec:
      containers:
        - env:
            - name: AUDIOBOOKSHELF_UID
              value: "1000"
            - name: AUDIOBOOKSHELF_GID
              value: "100"
          image: ghcr.io/advplyr/audiobookshelf:latest@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d
          imagePullPolicy: IfNotPresent
          name: audiobookshelf
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: config-volume
              subPath: audiobookshelf/config
            - mountPath: /audiobooks
              name: audiobook-data
              subPath: audiobooks
            - mountPath: /podcasts
              name: audiobook-data
              subPath: podcasts
            - mountPath: /metadata
              name: audiobook-data
              subPath: metadata
      hostname: audiobookshelf
      volumes:
        - name: config-volume
          nfs:
            server: ${NFS_STORAGE_HOST_FAST}
            path: /mnt/mospeed/swarm-config
        - name: audiobook-data
          persistentVolumeClaim:
            claimName: audiobook-pvc
