apiVersion: apps/v1
kind: Deployment
metadata:
  name: &deploymentName audiobookshelf-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: *deploymentName
  template:
    metadata:
      labels:
        app: *deploymentName
    spec:
      containers:
        - env:
            - name: AUDIOBOOKSHELF_UID
              value: "1000"
            - name: AUDIOBOOKSHELF_GID
              value: "100"
          image: ghcr.io/advplyr/audiobookshelf:latest@sha256:89276ff2e0b3d2f07dd334b641f27a34ab7f02e1047c60b7b8a30126cb0813a5
          imagePullPolicy: IfNotPresent
          name: audiobookshelf
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: config-volume
              subPath: audiobookshelf/config
            - mountPath: /audiobooks
              name: audiobook-data
              subPath: audiobooks
            - mountPath: /podcasts
              name: audiobook-data
              subPath: podcasts
            - mountPath: /metadata
              name: audiobook-data
              subPath: metadata
      hostname: audiobookshelf
      volumes:
        - name: config-volume
          nfs:
            server: ${NFS_STORAGE_HOST}
            path: /mnt/mospeed/swarm-config
        - name: audiobook-data
          persistentVolumeClaim:
            claimName: audiobook-pvc
