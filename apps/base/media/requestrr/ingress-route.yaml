apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: requestrr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`requestrr.internal.${DOMAIN}`)
      kind: Rule
      services:
        - name: requestrr-service
          port: 4545
  tls:
    certResolver: letsencrypt
