apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: requestrr
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`requestrr.local.${DOMAIN}`)
      kind: Rule
      middlewares:
        - name: authelia-forward-auth
          namespace: network-system
      services:
        - name: requestrr-service
          port: 4545
  tls:
    certResolver: letsencrypt
