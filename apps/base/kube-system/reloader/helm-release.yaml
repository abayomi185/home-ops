# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: reloader
      version: 2.2.14
      sourceRef:
        kind: HelmRepository
        name: stakater-charts
      interval: 5m
  values:
    reloader:
      ignoreJobs: true
      ignoreCronJobs: true
      reloadStrategy: annotations
      deployment:
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
