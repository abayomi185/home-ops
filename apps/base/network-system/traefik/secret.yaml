# Flux postBuild substitutes ${CF_DNS_API_TOKEN} from cluster-secrets.
# Cloudflare DNS-01 challenge — yomitosh.media uses Cloudflare nameservers.
# Token needs Zone:Read + DNS:Edit permissions.
# See: https://go-acme.github.io/lego/dns/cloudflare/
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
type: Opaque
stringData:
  api-token: ${CF_DNS_API_TOKEN}
