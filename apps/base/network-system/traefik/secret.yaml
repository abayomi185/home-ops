# Flux postBuild substitutes ${HETZNER_API_TOKEN} from cluster-secrets.
# Note: Traefik v3.5.4+ uses the new Hetzner Cloud API which requires
# HETZNER_API_TOKEN (not the legacy HETZNER_API_KEY). The token must be
# generated from the Hetzner Cloud console, not the DNS console.
# See: https://github.com/traefik/traefik/issues/12226
apiVersion: v1
kind: Secret
metadata:
  name: hetzner-api-token
type: Opaque
stringData:
  api-token: ${HETZNER_API_TOKEN}
