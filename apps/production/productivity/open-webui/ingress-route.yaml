apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: open-webui
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`chat-internal.internal.${SECRET_DOMAIN}`) || Host(`chat-internal.${SECRET_DOMAIN}`)
      kind: Rule
      services:
        - name: open-webui-service
          port: 8080
  tls:
    certResolver: letsencrypt
