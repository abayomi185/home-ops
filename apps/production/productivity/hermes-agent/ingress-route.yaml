apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hermes-agent
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hermes.local.${DOMAIN}`)
      kind: Rule
      services:
        - name: hermes-agent-service
          port: 9119
  tls:
    certResolver: letsencrypt
