apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-deployment
  namespace: media
spec:
  # See https://github.com/immich-app/immich-charts/blob/main/charts/immich/values.yaml
  # for the full list of values that can be overriden
  values:
    immich:
      existingConfiguration: immich-secrets
      configurationKind: Secret
      persistence:
        library:
          existingClaim: immich-data-pvc
    server:
      service:
        main:
          type: ClusterIP
          ports:
            http:
              port: 2283
              targetPort: 2283
      persistence:
        external-data-main:
          enabled: true
          existingClaim: immich-external-data-main-pvc
          globalMounts:
            - path: /usr/src/app/external-data/main
              readOnly: true
        external-data-ftp:
          enabled: true
          existingClaim: immich-external-data-ftp-pvc
          globalMounts:
            - path: /usr/src/app/external-data/ftp
              readOnly: true
      # nodeSelector:
      # kubernetes.io/hostname: knode3
      # intel.feature.node.kubernetes.io/gpu: "true"
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-server
                tag: "v3.0.0@sha256:685ba5c93337058ff8a189d3ed89f0ba470ef966b1c94d2eace1a3d991f9816e"
              env:
                DB_URL:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: uri
    valkey:
      enabled: true
    machine-learning:
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-machine-learning
                tag: "v3.0.0@sha256:5b480e92a2b77618d9ccae8c8110b0eae144ec9daf86715d246ec6d39cb7a553"
      # nodeSelector:
      #   kubernetes.io/hostname: knode2
      #   intel.feature.node.kubernetes.io/gpu: "true"
