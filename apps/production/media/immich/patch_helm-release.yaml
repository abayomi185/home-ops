apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-deployment
  namespace: media
spec:
  # See https://github.com/immich-app/immich-charts/blob/main/charts/immich/values.yaml
  # for the full list of values that can be overriden
  values:
    immich:
      existingConfiguration: immich-secrets
      configurationKind: Secret
      persistence:
        library:
          existingClaim: immich-data-pvc
    server:
      service:
        main:
          type: ClusterIP
          ports:
            http:
              port: 2283
              targetPort: 2283
      persistence:
        external-data-main:
          enabled: true
          existingClaim: immich-external-data-main-pvc
          globalMounts:
            - path: /usr/src/app/external-data/main
              readOnly: true
        external-data-ftp:
          enabled: true
          existingClaim: immich-external-data-ftp-pvc
          globalMounts:
            - path: /usr/src/app/external-data/ftp
              readOnly: true
      # nodeSelector:
      # kubernetes.io/hostname: knode3
      # intel.feature.node.kubernetes.io/gpu: "true"
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-server
                tag: "v3.0.2@sha256:14390f3dc9512dc3273b12ccee6363d9be16c388699abc3f3fe0498bb9829937"
              env:
                DB_URL:
                  valueFrom:
                    secretKeyRef:
                      name: immich-database-app
                      key: uri
    valkey:
      enabled: true
    machine-learning:
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-machine-learning
                tag: "v3.0.2@sha256:412f68e46e1966d0f87a8733a430369ee184b3a83e7b1e2db536dff291a34aa7"
      # nodeSelector:
      #   kubernetes.io/hostname: knode2
      #   intel.feature.node.kubernetes.io/gpu: "true"
