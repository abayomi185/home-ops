apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jellyfin-media
  namespace: flux-system
spec:
  targetNamespace: media
  path: ./apps/production/media/jellyfin
  prune: true
  wait: false
  sourceRef:
    kind: GitRepository
    name: flux-system
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  dependsOn:
    - name: cluster-configs
    - name: intel-device-plugin-production
    - name: node-feature-discovery-rules-production
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
