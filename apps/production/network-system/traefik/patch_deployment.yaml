apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
spec:
  template:
    spec:
      containers:
        - name: traefik
          args:
            - "--entryPoints.web.address=:8000/tcp"
            - "--entryPoints.websecure.address=:8443/tcp"
            - "--entryPoints.traefik.address=:9000/tcp"
            - "--api=true"
            - "--api.dashboard=true"
            - "--ping=true"
            - "--providers.kubernetescrd"
            - "--providers.kubernetescrd.allowCrossNamespace=true"
            # ACME via Hetzner DNS-01 challenge
            - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
            - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=hetzner"
            - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforechecks=60"
            - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers[0]=1.1.1.1:53"
            - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers[1]=8.8.8.8:53"
            # Default TLS certs — wildcards for public + LAN domains
            - "--entrypoints.websecure.http.tls.domains[0].main=${SECRET_DOMAIN}"
            - "--entrypoints.websecure.http.tls.domains[0].sans=*.${SECRET_DOMAIN}"
            - "--entrypoints.websecure.http.tls.domains[1].main=internal.${SECRET_DOMAIN}"
            - "--entrypoints.websecure.http.tls.domains[1].sans=*.internal.${SECRET_DOMAIN}"
            - "--entrypoints.websecure.http.tls.domains[2].main=local.${SECRET_DOMAIN}"
            - "--entrypoints.websecure.http.tls.domains[2].sans=*.local.${SECRET_DOMAIN}"
